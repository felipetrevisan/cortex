<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 244) rotate(54.602) scale(621.535)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.32"/>
      <stop offset="0.38" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="172" y1="144" x2="860" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="orbit" x1="280" y1="246" x2="776" y2="744" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(184)">
      <stop stop-color="white"/>
      <stop offset="0.42" stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.14"/>
    </radialGradient>
    <filter id="softGlow" x="150" y="150" width="724" height="724" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="22" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="240" fill="#020617"/>
  <rect width="1024" height="1024" rx="240" fill="url(#bgGlow)"/>
  <rect x="108" y="108" width="808" height="808" rx="204" fill="url(#panel)"/>
  <rect x="108" y="108" width="808" height="808" rx="204" stroke="rgba(103,232,249,0.18)"/>
  <rect x="144" y="144" width="736" height="736" rx="176" stroke="rgba(255,255,255,0.08)"/>

  <g filter="url(#softGlow)">
    <circle cx="512" cy="512" r="272" stroke="url(#orbit)" stroke-width="54" stroke-linecap="round" stroke-dasharray="440 180"/>
    <ellipse cx="512" cy="512" rx="344" ry="160" transform="rotate(24 512 512)" stroke="url(#orbit)" stroke-width="30" stroke-opacity="0.92"/>
    <ellipse cx="512" cy="512" rx="344" ry="160" transform="rotate(-26 512 512)" stroke="url(#orbit)" stroke-width="30" stroke-opacity="0.72"/>
    <circle cx="512" cy="512" r="136" fill="url(#core)"/>
  </g>

  <circle cx="770" cy="418" r="42" fill="#67E8F9"/>
  <circle cx="308" cy="590" r="36" fill="#C084FC"/>
  <circle cx="512" cy="222" r="32" fill="#BFDBFE"/>
</svg>
